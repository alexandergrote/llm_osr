fail_fast: true

repos:
- repo: https://github.com/charliermarsh/ruff-pre-commit
  rev: 'v0.2.0'
  hooks:
    - id: ruff
      args: [--fix, --exit-non-zero-on-fix]
- repo: https://github.com/pre-commit/mirrors-mypy
  rev: v1.2.0
  hooks:
  - id: mypy
    args:
      - "--ignore-missing-imports"
    additional_dependencies: ['types-PyYAML']
- repo: local
  hooks:
  - id: unittest
    name: unittest
    entry: pytest -s -v --cov-report term-missing --cov=src --durations=0 tests/unit
    language: system
    types: [python]
    pass_filenames: false
    verbose: true
    always_run: false
  - id: integration
    name: integration
    entry: pytest -v -s --durations=0 tests/integration
    language: system
    types: [python]
    pass_filenames: false
    verbose: true
    always_run: false