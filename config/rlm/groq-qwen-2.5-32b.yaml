class: "src.ml.classifier.llm.util.rate_limit.RateLimitManager"
params:
  name: qwen-2.5-32b
  rate_limits:
    num_req_minute:
      limit: 1000
      increment_level: "frequency"
      agg_level: "%Y-%m-%d %H:%M"
      action: "raise"
      waiting_time: 60
    num_token_minute:
      limit: 250000
      increment_level: "token"
      agg_level: "%Y-%m-%d %H:%M"
      action: "raise"
      waiting_time: 60
    num_req_day:
      limit: 500000
      increment_level: "frequency"
      agg_level: "%Y-%m-%d"
      action: "raise"