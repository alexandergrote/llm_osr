class: src.TwoStageLLM
params:
  use_cache: true
  skip_unknown_detection: false
  shuffle_free_llms: false
  unknown_detection_prompt: "nd_with_classes.txt"
  unknown_detection_model_name: llama-3.3-8b
  selector:
    class: src.ml.classifier.llm.util.cosine_selector.CosineSelector
    params:
      mode: "knn"
      n_classes: 3
      n_datapoints: 5 
  unknown_detection_model:
    free_llms:
      - ollama-llama-8b.yaml
  classifier_model: 
    free_llms:
      - ollama-llama-8b.yaml