class: src.TwoStageLLM
params:
  use_cache: true
  skip_unknown_detection: false
  shuffle_free_llms: false
  unknown_detection_scenario: 'explicit_fewshot'
  unknown_detection_model_name: llama-3.3-70b
  selector:
    class: src.ml.classifier.llm.util.cosine_selector.CosineSelector
    params:
      mode: "knn"
      n_classes: 3
      n_datapoints: 5 
  unknown_detection_model:
    free_llms: 
      - groq-llama-70b.yaml
      - cerebras-llama-70b.yaml
      - sambanova-llama-70b.yaml
    paid_llms:
      - hf-llama-70b.yaml
      - openrouter-llama-70b.yaml
  classifier_model: 
    free_llms: 
      - groq-llama-70b.yaml
      - cerebras-llama-70b.yaml
      - sambanova-llama-70b.yaml
    paid_llms:
      - hf-llama-70b.yaml
      - openrouter-llama-70b.yaml
